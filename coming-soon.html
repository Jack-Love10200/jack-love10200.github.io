<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="Images/favicon.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0f11;
      --surface: #16181c;
      --surface-2: #1e2027;
      --ink: #f0f1f4;
      --ink-muted: #7a7f8e;
      --red: #e8392a;
      --red-dim: rgba(232,57,42,0.12);
      --blue: #2d6ef5;
      --blue-dim: rgba(45,110,245,0.12);
      --accent: var(--red);
      --accent-light: var(--red-dim);
      --border: rgba(255,255,255,0.07);
      --tag-bg: rgba(255,255,255,0.06);
      --tag-ink: #9ba3b5;
      --radius: 16px;
      --shadow: 0 2px 12px rgba(0,0,0,0.4), 0 1px 3px rgba(0,0,0,0.3);
      --shadow-hover: 0 16px 48px rgba(0,0,0,0.6), 0 4px 16px rgba(0,0,0,0.4);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      padding-top: 72px;
      display: flex;
      flex-direction: column;
    }

    /* ── Navbar ── */
    .navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      height: 72px;
      display: flex;
      align-items: center;
      padding: 0 28px;
      background: rgba(14,15,17,0.82);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
    }

    .nav-name {
      font-family: 'Instrument Serif', serif;
      font-size: 2.3rem;
      font-weight: 400;
      letter-spacing: -0.01em;
      color: var(--blue);
      text-decoration: none;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .nav-name span {
      color: var(--red);
    }

    .nav-name w {
      color: var(--ink);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 2px;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    .nav-links a {
      font-size: 13px;
      font-weight: 500;
      color: var(--ink-muted);
      text-decoration: none;
      padding: 6px 12px;
      border-radius: 8px;
      transition: color 0.15s, background 0.15s;
      white-space: nowrap;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--ink);
      background: rgba(255,255,255,0.06);
    }

    .nav-links a.active {
      color: var(--red);
    }

    .nav-icons {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    .nav-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border-radius: 8px;
      color: var(--ink-muted);
      text-decoration: none;
      transition: color 0.15s, background 0.15s;
    }

    .nav-icon:hover { color: var(--ink); background: rgba(255,255,255,0.06); }

    .nav-resume {
      display: flex;
      align-items: center;
      gap: 6px;
      height: 32px;
      padding: 0 13px;
      border-radius: 8px;
      border: 1px solid rgba(232,57,42,0.45);
      color: var(--red);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.02em;
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s;
      margin-left: 6px;
      white-space: nowrap;
    }

    .nav-resume:hover {
      background: var(--red-dim);
      border-color: var(--red);
    }

    .nav-hamburger {
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      width: 34px;
      height: 34px;
      padding: 8px;
      border-radius: 8px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--ink-muted);
      transition: color 0.15s, background 0.15s;
      margin-left: auto;
      margin-right: -8px;
    }

    .nav-hamburger:hover { color: var(--ink); background: rgba(255,255,255,0.06); }
    .nav-hamburger.open { color: var(--red); }

    .nav-hamburger span {
      display: block;
      width: 18px;
      height: 2px;
      background: currentColor;
      border-radius: 1px;
      transition: all 0.25s;
    }

    .nav-hamburger.open span:nth-child(1) {
      transform: rotate(45deg) translate(8px, 8px);
    }

    .nav-hamburger.open span:nth-child(2) {
      opacity: 0;
    }

    .nav-hamburger.open span:nth-child(3) {
      transform: rotate(-45deg) translate(7px, -7px);
    }

    #drawer {
      position: fixed;
      top: 72px;
      left: 0;
      right: 0;
      background: rgba(14,15,17,0.98);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.25s;
      z-index: 99;
    }

    #drawer.open {
      max-height: 400px;
    }

    .nav-drawer-links {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 16px 28px;
      margin-bottom: 8px;
    }

    .nav-drawer-links a {
      font-size: 13px;
      font-weight: 500;
      color: var(--ink-muted);
      text-decoration: none;
      padding: 8px 12px;
      border-radius: 8px;
      transition: color 0.15s, background 0.15s;
    }

    .nav-drawer-links a:hover,
    .nav-drawer-links a.active {
      color: var(--ink);
      background: rgba(255,255,255,0.06);
    }

    .nav-drawer-links a.active {
      color: var(--red);
    }

    .nav-drawer-resume {
      display: flex;
      align-items: center;
      gap: 6px;
      height: 36px;
      padding: 0 13px;
      margin: 0 28px 16px;
      border-radius: 8px;
      border: 1px solid rgba(232,57,42,0.45);
      color: var(--red);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.02em;
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s;
    }

    .nav-drawer-resume:hover {
      background: var(--red-dim);
      border-color: var(--red);
    }

    @media (max-width: 768px) {
      .nav-links { display: none; }
      .nav-hamburger { display: flex; }
    }

    /* ── Main Content ── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 28px;
    }

    /* ── Construction Container ── */
    .construction-container {
      max-width: 600px;
      text-align: center;
    }

    .construction-icon {
      width: 120px;
      height: 120px;
      margin: 0 auto 40px;
      border-radius: var(--radius);
      background: var(--surface);
      border: 2px solid var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 2s ease-in-out infinite;
    }

    .construction-icon svg {
      width: 60px;
      height: 60px;
      color: var(--red);
      stroke-width: 1.5;
    }

    @keyframes pulse {
      0%, 100% { 
        box-shadow: 0 0 0 0 rgba(232,57,42,0.7);
      }
      50% { 
        box-shadow: 0 0 0 20px rgba(232,57,42,0);
      }
    }

    h1 {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 400;
      letter-spacing: -0.01em;
      margin-bottom: 16px;
      color: var(--ink);
    }

    .subtitle {
      font-size: 16px;
      color: var(--ink-muted);
      margin-bottom: 32px;
      line-height: 1.6;
    }

    /* ── Status Boxes ── */
    .status-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 16px;
      margin-bottom: 40px;
    }

    .status-box {
      padding: 24px 16px;
      border-radius: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
    }

    .status-label {
      font-size: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--ink-muted);
      margin-bottom: 8px;
    }

    .status-value {
      font-family: 'Instrument Serif', serif;
      font-size: 1.8rem;
      font-weight: 400;
      color: var(--red);
    }

    /* ── CTA Buttons ── */
    .cta-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.15s;
      cursor: pointer;
      border: none;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
      border: 1px solid var(--accent);
    }

    .btn-primary:hover {
      background: rgba(232,57,42,0.9);
      box-shadow: var(--shadow-hover);
    }

    .btn-secondary {
      background: transparent;
      color: var(--red);
      border: 1px solid rgba(232,57,42,0.45);
    }

    .btn-secondary:hover {
      background: var(--red-dim);
      border-color: var(--red);
    }

    /* ── Newsletter ── */
    .newsletter-section {
      margin-top: 48px;
      padding: 32px;
      border-radius: var(--radius);
      background: var(--surface);
      border: 1px solid var(--border);
    }

    .newsletter-section h3 {
      font-family: 'Instrument Serif', serif;
      font-size: 1.2rem;
      font-weight: 400;
      margin-bottom: 12px;
      color: var(--ink);
    }

    .newsletter-section p {
      font-size: 14px;
      color: var(--ink-muted);
      margin-bottom: 16px;
    }

    .newsletter-form {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .newsletter-form input {
      flex: 1;
      min-width: 200px;
      padding: 10px 14px;
      border-radius: 8px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
    }

    .newsletter-form input::placeholder {
      color: var(--ink-muted);
    }

    .newsletter-form input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .newsletter-form button {
      padding: 10px 20px;
      border-radius: 8px;
      background: var(--accent);
      color: white;
      border: none;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }

    .newsletter-form button:hover {
      background: rgba(232,57,42,0.9);
    }

    /* ── Footer ── */
    footer {
      padding: 40px 28px;
      text-align: center;
      border-top: 1px solid var(--border);
      color: var(--ink-muted);
      font-size: 14px;
      margin-top: auto;
    }

    @media (max-width: 768px) {
      .construction-icon {
        width: 100px;
        height: 100px;
        margin-bottom: 32px;
      }

      .status-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .newsletter-form {
        flex-direction: column;
      }

      .newsletter-form input {
        min-width: 100%;
      }
    }
  </style>
</head>

  <script>
    // Hamburger menu
    const btn = document.getElementById('hamburger');
    const drawer = document.getElementById('drawer');

    if (btn && drawer) {
      btn.addEventListener('click', () => {
        const open = drawer.classList.toggle('open');
        btn.classList.toggle('open', open);
      });

      drawer.querySelectorAll('a').forEach((link) => {
        link.addEventListener('click', () => {
          drawer.classList.remove('open');
          btn.classList.remove('open');
        });
      });
    }

    // Newsletter form
    const newsletterForm = document.getElementById('newsletterForm');
    if (newsletterForm) {
      newsletterForm.addEventListener('submit', function(e) {
        e.preventDefault();
        const email = this.querySelector('input[type="email"]').value;
        
        // Simulate subscription (replace with actual API call)
        const button = this.querySelector('button');
        const originalText = button.textContent;
        button.textContent = 'Subscribed!';
        button.style.background = 'var(--blue)';
        button.style.borderColor = 'var(--blue)';
        
        this.reset();
        
        setTimeout(() => {
          button.textContent = originalText;
          button.style.background = '';
          button.style.borderColor = '';
        }, 3000);
      });
    }
  </script>
